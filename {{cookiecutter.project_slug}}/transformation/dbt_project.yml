name: '{{ cookiecutter.project_slug }}'
version: '1.0.0'
profile: '{{ cookiecutter.project_slug }}'
model-paths: ["models"]
seed-paths: ["seeds"]
{%- if cookiecutter.include_lakehouse %}

# Ensures the `events` table exists in ../lakehouse.duckdb before models query
# it via source('lakehouse', 'events'), even if no application code has run
# yet. The DDL below is copied verbatim from
# src/{{ cookiecutter.project_slug }}/lakehouse/create_tables.sql by
# hooks/post_gen_project.py at generation time — edit that file, not this
# placeholder, when the schema changes.
on-run-start:
  - "__LAKEHOUSE_CREATE_TABLE_DDL__"
{%- endif %}
