name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
{%- if cookiecutter.include_dbt %}
      - name: dbt deps
        working-directory: transformation
        run: uv run dbt deps
      - name: dbt build
        working-directory: transformation
        run: uv run dbt build
      - name: dbt test
        working-directory: transformation
        run: uv run dbt test
{%- endif %}
